<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Tape Comic</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #111;
}

/* perspective wrapper */
.tape-container-comic {
    perspective: 1200px;
    user-select: none;
    display: inline-block;
}

/* main object */
.tape-comic {
    position: relative;
    width: 200px;
    height: 328px;
    transform-style: preserve-3d;
    transition: transform 0.75s;
}

/* hover animation */
.tape-comic:hover {
    transform: rotateY(45deg) translateZ(10px);
}

/* cover image */
.tape-cover {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    z-index: 2;
}

.tape-cover img {
    width: 100%;
    height: 100%;
    display: block;
}

/* spine */
.tape-spine {
    position: absolute;
    top: 0;
    left: 0;
    width: 20px;
    height: 100%;
    transform: rotateY(-90deg) translateZ(10px);
    transform-origin: left;
    backface-visibility: hidden;
    z-index: 1;
}

.tape-spine img {
    width: 100%;
    height: 100%;
    display: block;
}
</style>
</head>

<body>

<div class="tape-container-comic">
    <div class="tape-comic">

        <div class="tape-cover">
            <img src="https://static.wikia.nocookie.net/zenless-zone-zero/images/8/81/Chapter_Nekomiya_Mana_1_Tape_Cover_Front.png" />
        </div>

        <div class="tape-spine">
            <img src="https://static.wikia.nocookie.net/zenless-zone-zero/images/b/b2/Chapter_Nekomiya_Mana_1_Tape_Spine.png" />
        </div>

    </div>
</div>

</body>
</html>
